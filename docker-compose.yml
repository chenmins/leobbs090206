version: '3.8'

services:
  leobbs:
    build: .
    container_name: leobbs-forum
    ports:
      - "8080:80"
    volumes:
      - ./persist/data:/var/www/html/cgi-bin/data
      - ./persist/members:/var/www/html/cgi-bin/members
      - ./persist/messages:/var/www/html/cgi-bin/messages
      - ./persist/boarddata:/var/www/html/cgi-bin/boarddata
      - ./persist/usr:/var/www/html/non-cgi/usr
      - ./persist/usravatars:/var/www/html/non-cgi/usravatars
    restart: unless-stopped
