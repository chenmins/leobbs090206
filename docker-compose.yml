version: '3.8'

services:
  leobbs:
    build: .
    container_name: leobbs-forum
    ports:
      - "8080:80"
    volumes:
      - leobbs_data:/var/www/html/cgi-bin/data
      - leobbs_members:/var/www/html/cgi-bin/members
      - leobbs_messages:/var/www/html/cgi-bin/messages
      - leobbs_boarddata:/var/www/html/cgi-bin/boarddata
      - leobbs_usr:/var/www/html/non-cgi/usr
    restart: unless-stopped

volumes:
  leobbs_data:
  leobbs_members:
  leobbs_messages:
  leobbs_boarddata:
  leobbs_usr:
